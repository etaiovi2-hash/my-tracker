<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itai's OS | Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --card: #161b22; --primary: #58a6ff;
            --success: #238636; --text: #c9d1d9; --accent: #bc8cff;
        }
        body { background-color: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding-bottom: 80px; }
        .container { width: 100%; max-width: 500px; margin: auto; padding: 15px; }
        
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        
        /* Navigation Menu */
        .nav-menu { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid #30363d; display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        .nav-item { color: #8b949e; font-size: 11px; cursor: pointer; text-align: center; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }

        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }

        /* Calendar & Tasks */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .calendar-day { padding: 8px; border-radius: 8px; font-size: 12px; cursor: pointer; text-align: center; border: 1px solid transparent; }
        .calendar-day.active { border-color: var(--primary); background: rgba(88, 166, 255, 0.1); }
        
        .task-item { display: flex; align-items: center; background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-right: 4px solid var(--primary); }
        .task-item.completed { opacity: 0.5; border-right-color: var(--success); text-decoration: line-through; }

        /* Goals Page */
        .goal-row { background: #0d1117; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .progress-bg { background: #30363d; height: 8px; border-radius: 4px; margin-top: 10px; }
        .progress-fill { background: var(--accent); height: 100%; border-radius: 4px; transition: width 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <!-- דף 1: לוח שנה ומשימות -->
    <div id="page-tasks" class="page active">
        <h2 style="color:var(--primary)">COMMAND CENTER</h2>
        <div class="card">
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div class="card">
            <h3 id="selectedDateTitle" style="font-size:14px; color:var(--accent)">משימות להיום</h3>
            <div id="taskList"></div>
            <input type="text" id="newTaskInput" placeholder="הוסף משימה ספציפית..." style="width:100%; padding:10px; background:#0d1117; border:1px solid #30363d; color:white; border-radius:8px; box-sizing:border-box;">
            <button onclick="addNewTask()" style="width:100%; margin-top:10px; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;">הוסף משימה</button>
        </div>
    </div>

    <!-- דף 2: השוואה וגרפים -->
    <div id="page-stats" class="page">
        <h2 style="color:var(--primary)">ANALYTICS</h2>
        <div class="card">
            <h3 style="font-size:14px;">השוואת ביצועים שבועית</h3>
            <div style="height:250px;"><canvas id="compareChart"></canvas></div>
        </div>
        <div class="card">
            <h3 style="font-size:14px;">סטטיסטיקה יבשה</h3>
            <p id="stats-summary" style="font-size:13px; color:#8b949e">טוען נתונים...</p>
        </div>
    </div>

    <!-- דף 3: מטרות -->
    <div id="page-goals" class="page">
        <h2 style="color:var(--primary)">OBJECTIVES</h2>
        <div class="card">
            <h3 style="font-size:14px;">הגדרת מטרות חדשות</h3>
            <input type="text" id="goalName" placeholder="שם המטרה (למשל: יעד מכירות Shopify)" style="width:100%; padding:10px; background:#0d1117; border:1px solid #30363d; color:white; border-radius:8px; margin-bottom:10px;">
            <input type="number" id="goalTarget" placeholder="ערך יעד (למשל: 1000)" style="width:100%; padding:10px; background:#0d1117; border:1px solid #30363d; color:white; border-radius:8px; margin-bottom:10px;">
            <button onclick="addGoal()" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">צור מטרה</button>
        </div>
        <div id="goalsList"></div>
    </div>
</div>

<nav class="nav-menu">
    <div class="nav-item active" onclick="switchPage('page-tasks', this)"><i>📅</i>לו"ז</div>
    <div class="nav-item" onclick="switchPage('page-stats', this)"><i>📊</i>גרפים</div>
    <div class="nav-item" onclick="switchPage('page-goals', this)"><i>🎯</i>מטרות</div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('itai_os_db')) || { tasks: {}, goals: [], history: [40, 55, 30, 85, 20, 10, 0] };
    let selectedDate = new Date().toISOString().split('T')[0];
    const defaultTasks = ["TRAINING", "DEV / STUDY", "BUSINESS", "FLOW STATE"];

    function switchPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
        if(pageId === 'page-stats') renderStats();
    }

    function init() {
        renderCalendar();
        selectDate(selectedDate);
        renderGoals();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const now = new Date();
        for (let i = 1; i <= 31; i++) {
            const dateStr = `2026-05-${String(i).padStart(2, '0')}`;
            const dayEl = document.createElement('div');
            dayEl.className = 'calendar-day' + (dateStr === selectedDate ? ' active' : '');
            dayEl.innerText = i;
            dayEl.onclick = () => selectDate(dateStr);
            grid.appendChild(dayEl);
        }
    }

    function selectDate(dateStr) {
        selectedDate = dateStr;
        if (!db.tasks[dateStr]) {
            db.tasks[dateStr] = defaultTasks.map(t => ({ text: t, completed: false }));
        }
        renderCalendar();
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        db.tasks[selectedDate].forEach((t, i) => {
            list.innerHTML += `<div class="task-item ${t.completed ? 'completed' : ''}">
                <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask(${i})">
                <span>${t.text}</span>
            </div>`;
        });
    }

    function toggleTask(i) {
        db.tasks[selectedDate][i].completed = !db.tasks[selectedDate][i].completed;
        if(db.tasks[selectedDate][i].completed) confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
        save();
    }

    function addNewTask() {
        const input = document.getElementById('newTaskInput');
        if(input.value) {
            db.tasks[selectedDate].push({ text: input.value, completed: false });
            input.value = '';
            save();
            renderTasks();
        }
    }

    function addGoal() {
        const name = document.getElementById('goalName').value;
        const target = document.getElementById('goalTarget').value;
        if(name && target) {
            db.goals.push({ name, target, current: 0 });
            save();
            renderGoals();
        }
    }

    function renderGoals() {
        const list = document.getElementById('goalsList');
        list.innerHTML = '';
        db.goals.forEach((g, i) => {
            const percent = Math.min((g.current / g.target) * 100, 100);
            list.innerHTML += `<div class="goal-row" onclick="updateGoal(${i})">
                <div style="display:flex; justify-content:space-between">
                    <span>${g.name}</span>
                    <span>${g.current}/${g.target}</span>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${percent}%"></div></div>
            </div>`;
        });
    }

    function updateGoal(i) {
        let val = prompt("עדכן התקדמות (מספר):", db.goals[i].current);
        if(val !== null) {
            db.goals[i].current = parseInt(val);
            save();
            renderGoals();
        }
    }

    function renderStats() {
        const ctx = document.getElementById('compareChart').getContext('2d');
        if(window.chartObj) window.chartObj.destroy();
        
        // יצירת נתונים מדומים להשוואה בין שבועות
        window.chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'],
                datasets: [
                    { label: 'השבוע', data: [60, 70, 45, 90, 0, 0, 0], borderColor: '#58a6ff', tension: 0.3 },
                    { label: 'שבוע שעבר', data: [40, 50, 60, 55, 70, 30, 20], borderColor: '#8b949e', borderDash: [5, 5], tension: 0.3 }
                ]
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
        });
        document.getElementById('stats-summary').innerText = "ביצועי השבוע שלך גבוהים ב-12% משבוע שעבר. העסק בשיא!";
    }

    function save() { localStorage.setItem('itai_os_db', JSON.stringify(db)); }
    init();
</script>
</body>
</html>
