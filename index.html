<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itai's Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --primary: #58a6ff;
            --success: #238636;
            --text: #c9d1d9;
            --accent: #bc8cff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 600px; }

        /* Header & Level System */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .level-badge { background: linear-gradient(45deg, var(--primary), var(--accent)); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 15px rgba(88, 166, 255, 0.3); }

        /* XP Bar */
        .xp-container { width: 100%; height: 8px; background: #30363d; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
        #xp-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; }

        /* Card Styling */
        .card {
            background: var(--card);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); border-color: var(--primary); }

        /* Task Items */
        .task-row { display: flex; align-items: flex-start; gap: 15px; padding: 15px 0; border-bottom: 1px solid #30363d; }
        .task-row:last-child { border: none; }
        
        .checkbox-wrapper { position: relative; width: 28px; height: 28px; }
        input[type="checkbox"] { width: 28px; height: 28px; cursor: pointer; accent-color: var(--success); }

        .task-info { flex-grow: 1; }
        .task-label { display: block; font-size: 17px; font-weight: 500; margin-bottom: 5px; }
        
        .efficiency-box { background: #0d1117; padding: 12px; border-radius: 8px; margin-top: 10px; display: none; }
        input[type="checkbox"]:checked ~ .efficiency-box { display: block; animation: fadeIn 0.3s; }

        input[type="range"] { width: 100%; height: 6px; border-radius: 5px; background: #30363d; outline: none; }

        /* Floating Bot */
        #bot-bubble {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--card);
            border: 1px solid var(--primary);
            padding: 15px;
            border-radius: 20px 20px 20px 5px;
            max-width: 200px;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .btn-reset { background: transparent; border: 1px dotted #f85149; color: #f85149; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>COMMAND CENTER</h1>
        <div class="level-badge" id="level-text">LEVEL 1</div>
    </div>

    <div class="xp-container">
        <div id="xp-fill"></div>
    </div>

    <div class="card">
        <h2 style="font-size: 18px; color: var(--primary);">DAILY OBJECTIVES</h2>
        <div id="taskList"></div>
    </div>

    <div class="card">
        <h2 style="font-size: 18px; color: var(--accent);">WEEKLY FLOW</h2>
        <div style="height: 150px;"><canvas id="performanceChart"></canvas></div>
    </div>

    <button class="btn-reset" onclick="resetDay()">RESET SYSTEM</button>
</div>

<div id="bot-bubble">
    <span style="font-size: 24px;">🤖</span>
    <span id="bot-msg">מערכת מוכנה. מחכה לפקודות שלך, איתי.</span>
</div>

<script>
    const taskData = [
        { id: 'train', name: 'TRAINING', desc: 'כדורסל / אימון כוח', xp: 25 },
        { id: 'code', name: 'DEV / STUDY', desc: 'תכנות ולימודים', xp: 25 },
        { id: 'biz', name: 'BUSINESS', desc: 'קידום Shopify / מסחר', xp: 40 },
        { id: 'mind', name: 'FLOW STATE', desc: 'זמן חופשי ומנוחה', xp: 10 }
    ];

    let currentXP = 0;
    let level = 1;

    function init() {
        const list = document.getElementById('taskList');
        taskData.forEach(t => {
            list.innerHTML += `
                <div class="task-row">
                    <div class="task-info">
                        <label class="task-label">${t.name}</label>
                        <span style="font-size:12px; color:#8b949e">${t.desc}</span>
                        <div class="efficiency-box">
                            <span style="font-size:11px">INTENSITY: <b id="val-${t.id}">5</b>/10</span>
                            <input type="range" id="range-${t.id}" min="1" max="10" value="5" oninput="updateStats()">
                        </div>
                    </div>
                    <input type="checkbox" id="${t.id}" onchange="updateStats()">
                </div>`;
        });
        load();
    }

    function updateStats() {
        let done = 0;
        let dayXP = 0;
        
        taskData.forEach(t => {
            const checked = document.getElementById(t.id).checked;
            const eff = document.getElementById(`range-${t.id}`).value;
            document.getElementById(`val-${t.id}`).innerText = eff;
            
            if(checked) {
                done++;
                dayXP += t.xp * (eff / 5);
            }
        });

        // XP Logic
        currentXP = dayXP % 100;
        level = Math.floor(dayXP / 100) + 1;
        
        document.getElementById('xp-fill').style.width = currentXP + "%";
        document.getElementById('level-text').innerText = "LEVEL " + level;

        // Bot Reactions
        const bot = document.getElementById('bot-msg');
        if(done === 4) {
            bot.innerText = "ביצועים מושלמים! המערכת בשיא.";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else if (done > 0) {
            bot.innerText = "זיהיתי התקדמות. המשך כך.";
        }

        save();
    }

    function save() {
        const state = taskData.map(t => ({
            id: t.id,
            checked: document.getElementById(t.id).checked,
            eff: document.getElementById(`range-${t.id}`).value
        }));
        localStorage.setItem('itai_pro_dashboard', JSON.stringify(state));
    }

    function load() {
        const saved = JSON.parse(localStorage.getItem('itai_pro_dashboard'));
        if(saved) {
            saved.forEach(s => {
                const el = document.getElementById(s.id);
                if(el) {
                    el.checked = s.checked;
                    document.getElementById(`range-${s.id}`).value = s.eff;
                }
            });
            updateStats();
        }
    }

    function resetDay() {
        if(confirm("המערכת תתאפס. מוכן ליום חדש?")) {
            taskData.forEach(t => {
                document.getElementById(t.id).checked = false;
                document.getElementById(`range-${t.id}`).value = 5;
            });
            updateStats();
        }
    }

    // Chart
    const ctx = document.getElementById('performanceChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['S', 'M', 'T', 'W', 'T', 'F', 'S'],
            datasets: [{
                label: 'Performance',
                data: [40, 80, 60, 95, 0, 0, 0],
                backgroundColor: '#58a6ff',
                borderRadius: 5
            }]
        },
        options: {
            maintainAspectRatio: false,
            scales: { y: { display: false }, x: { grid: { display: false } } },
            plugins: { legend: { display: false } }
        }
    });

    init();
</script>
</body>
</html>
