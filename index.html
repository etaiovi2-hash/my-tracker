<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itai's OS | Hybrid Calendar</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --card: #161b22; --primary: #58a6ff;
            --success: #238636; --text: #c9d1d9; --accent: #bc8cff;
        }
        body { background-color: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { width: 100%; max-width: 500px; margin: auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        
        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day { padding: 10px 5px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid transparent; }
        .calendar-day.active { border-color: var(--primary); background: rgba(88, 166, 255, 0.1); font-weight: bold; }
        .calendar-day.today { color: var(--accent); text-decoration: underline; }

        /* Tasks */
        .task-item { display: flex; align-items: center; background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-right: 4px solid var(--primary); }
        .task-item.default { border-right-color: var(--accent); } /* משימות קבועות בצבע שונה */
        .task-item input[type="checkbox"] { margin-left: 12px; width: 20px; height: 20px; cursor: pointer; }
        .task-item.completed { opacity: 0.5; border-right-color: var(--success); text-decoration: line-through; }

        .add-task-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"] { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; flex-grow: 1; }
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; font-size:18px; color:var(--primary);">COMMAND CENTER</h2>

    <!-- לוח שנה -->
    <div class="card">
        <h3 id="monthTitle" style="margin-top:0; font-size:16px;">מאי 2026</h3>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <!-- משימות -->
    <div class="card">
        <h3 id="selectedDateTitle" style="margin-top:0; font-size:14px; color:var(--accent);">טוען...</h3>
        
        <div class="add-task-box">
            <input type="text" id="newTaskInput" placeholder="הוסף משימה ספציפית להיום...">
            <button onclick="addNewTask()">+</button>
        </div>

        <div id="taskList"></div>
    </div>
</div>

<script>
    // המשימות הקבועות שלך כפי שהגדרנו
    const defaultTasks = [
        "TRAINING (כדורסל / אימון כוח)",
        "DEV / STUDY (תכנות ולימודים)",
        "BUSINESS (קידום Shopify / מסחר)",
        "FLOW STATE (זמן חופשי ומנוחה)"
    ];

    let tasksDB = JSON.parse(localStorage.getItem('itai_tasks_v3')) || {};
    let selectedDate = new Date().toISOString().split('T')[0];

    function init() {
        renderCalendar();
        selectDate(selectedDate);
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const now = new Date();
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

        for (let i = 1; i <= daysInMonth; i++) {
            const currentDay = new Date(now.getFullYear(), now.getMonth(), i);
            const dateStr = currentDay.toISOString().split('T')[0];
            const dayEl = document.createElement('div');
            dayEl.className = 'calendar-day' + (dateStr === selectedDate ? ' active' : '') + (dateStr === new Date().toISOString().split('T')[0] ? ' today' : '');
            dayEl.innerText = i;
            dayEl.onclick = () => selectDate(dateStr);
            grid.appendChild(dayEl);
        }
    }

    function selectDate(dateStr) {
        selectedDate = dateStr;
        document.getElementById('selectedDateTitle').innerText = "משימות ליום: " + new Date(dateStr).toLocaleDateString('he-IL', {day:'numeric', month:'long'});
        
        // אם היום הזה פעם ראשונה נפתח, ניצור לו את הדיפולט
        if (!tasksDB[dateStr]) {
            tasksDB[dateStr] = defaultTasks.map(t => ({ text: t, completed: false, isDefault: true }));
        }
        
        renderCalendar();
        loadTasks();
    }

    function loadTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        tasksDB[selectedDate].forEach((task, index) => {
            const taskEl = document.createElement('div');
            taskEl.className = `task-item ${task.completed ? 'completed' : ''} ${task.isDefault ? 'default' : ''}`;
            taskEl.innerHTML = `
                <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                <span>${task.text}</span>
            `;
            list.appendChild(taskEl);
        });
    }

    function addNewTask() {
        const input = document.getElementById('newTaskInput');
        if (!input.value) return;
        tasksDB[selectedDate].push({ text: input.value, completed: false, isDefault: false });
        input.value = '';
        save();
    }

    function toggleTask(index) {
        tasksDB[selectedDate][index].completed = !tasksDB[selectedDate][index].completed;
        if(tasksDB[selectedDate][index].completed) confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 } });
        save();
    }

    function save() {
        localStorage.setItem('itai_tasks_v3', JSON.stringify(tasksDB));
        loadTasks();
    }

    init();
</script>
</body>
</html>
